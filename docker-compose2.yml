version: "3.8"

services:
  # 🤡 The "Secret Tunnel": WireGuard VPN
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
      - SERVERURL=your.home.ip # Update this!
      - SERVERPORT=51820
      - PEERS=iphone,laptop
      - PEERDNS=10.5.0.3 # Points to Pi-hole
    volumes:
      - ./vpn/config:/config
      - /lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    networks:
      clown_net:
        ipv4_address: 10.5.0.2
    restart: unless-stopped

  # 🛡️ The "Bouncer": Pi-hole Firewall
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    environment:
      - TZ=Pacific/Auckland
      - WEBPASSWORD=ChooseAStrongPassword
      - FTLCONF_LOCAL_IPV4=10.5.0.3
    volumes:
      - ./firewall/etc-pihole:/etc/pihole
      - ./firewall/etc-dnsmasq.d:/etc/dnsmasq.d
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80/tcp" # Access at http://localhost:8081/admin
    networks:
      clown_net:
        ipv4_address: 10.5.0.3
    restart: unless-stopped

  # 📈 The "Spectator": Uptime Kuma (Monitoring)
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - ./monitoring/data:/app/data
    ports:
      - "3001:3001" # Access at http://localhost:3001
    networks:
      clown_net:
        ipv4_address: 10.5.0.4
    restart: unless-stopped

networks:
  clown_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/24
